services:
  api:
    build: .
    ports: ["8000:8000"]
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_started
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MLFLOW_URL=http://mlflow:5000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ALLOWED_API_KEYS=${ALLOWED_API_KEYS:-}
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports: ["5000:5000"]
    environment:
      - MLFLOW_ALLOW_ARBITRARY_REQUESTS=true
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

volumes:
  mlflow_data:

networks:
  default:
    name: mst-platform-net
